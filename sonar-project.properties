# =========================================================================
# CONFIGURAÇÕES OBRIGATÓRIAS DO SONARCLOUD
# =========================================================================
sonar.projectKey=ignite
sonar.organization=ignite

# Informações básicas do projeto
sonar.projectName=Ignite
sonar.projectVersion=1.0

# =========================================================================
# CONFIGURAÇÕES DE ANÁLISE E COBERTURA
# =========================================================================
# Onde estão os arquivos de código-fonte principais? (Next.js App Router/Src)
sonar.sources=src, app

# Onde estão os arquivos de teste?
sonar.tests=src, app, __tests__

# Padrão de nomenclatura (Adicionado suporte a .jsx e .tsx para React/Next.js)
sonar.test.inclusions=**/__tests__/**/*.[jt]s?(x), **/*.test.[jt]s?(x), **/*.spec.[jt]s?(x)

# Ignorar pastas geradas, build do Next, banco e arquivos de configuração
sonar.exclusions=node_modules/**, .next/**, out/**, dist/**, scripts/**, prisma/**, .github/**, **/*.test.[jt]sx, **/*.test.[jt]s, **/*.spec.[jt]sx, **/*.spec.[jt]s, **/*.d.ts, next.config.*, tailwind.config.*

# Relatório de Cobertura de Testes gerado pelo Vitest
sonar.javascript.lcov.reportPaths=coverage/lcov.info