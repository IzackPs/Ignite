name: Esteira de Integração Contínua (CI)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Setup e Lint (Qualidade de Código)
    runs-on: ubuntu-latest
    steps:
      - name: Obter o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js (Versão 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Ativa o cache do npm automaticamente

      - name: Instalar as dependências
        run: npm ci # Utiliza 'npm ci' no CI para instalações limpas a partir do package-lock.json

      - name: Rodar a validação de formatação e regras estáticas (ESLint)
        run: npm run lint

  test:
    name: Testes Unitários e Integração (Vitest)
    runs-on: ubuntu-latest
    needs: lint # Depende do sucesso do job de Lint
    steps:
      - name: Obter o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js (Versão 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar as dependências
        run: npm ci

      - name: Executar a suíte de testes automatizados
        # Garante que nenhuma regra de negócio (como rebalanceamento) foi quebrada
        run: npm run test

  sonar:
    name: SonarQube / SonarCloud (Análise de Segurança)
    runs-on: ubuntu-latest
    needs: test # Depende do sucesso dos testes
    steps:
      - name: Obter o código do repositório
        uses: actions/checkout@v4
        with:
          # O SonarCloud precisa de todo o histórico (fetch-depth: 0) para analisar a evolução e culpar linhas corretamente
          fetch-depth: 0

      - name: Analisar a qualidade do código com SonarSource
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          # Token padrão gerado pelo GitHub para interações básicas
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token do SonarCloud que precisa ser configurado nos Secrets do repositório
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build (Sanity Check do Next.js)
    runs-on: ubuntu-latest
    needs: test # Também podemos colocar para rodar após os testes
    steps:
      - name: Obter o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js (Versão 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar as dependências
        run: npm ci

      - name: Garantir que a aplicação builda com sucesso
        # Garante que não temos erros de TypeScript ou falhas de build do Next.js
        run: npm run build
