name: Esteira de Integração Contínua (CI)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write 

jobs:
  lint:
    name: Setup e Lint (Qualidade de Código)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Obter o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js (Versão 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar as dependências
        run: npm ci

      - name: Rodar a validação de formatação (ESLint)
        run: npm run lint

  test:
    name: Testes Unitários e Integração (Vitest)
    runs-on: ubuntu-latest
    # Removido "needs: lint" para rodar em PARALELO e ganhar velocidade!
    timeout-minutes: 10
    steps:
      - name: Obter o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js (Versão 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar as dependências
        run: npm ci

      - name: Executar a suíte de testes com Cobertura (Coverage)
        run: npx vitest run --coverage.enabled --coverage.reporter=lcov --coverage.reporter=text

      - name: Fazer Upload do Relatório de Cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1

  build:
    name: Build (Sanity Check do Next.js)
    runs-on: ubuntu-latest
    # Removido "needs: test" para compilar em PARALELO!
    timeout-minutes: 15
    steps:
      - name: Obter o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js (Versão 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Restaurar Cache de Build do Next.js
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Instalar as dependências
        run: npm ci

      - name: Garantir que a aplicação builda com sucesso
        run: npm run build

  sonar:
    name: SonarQube (Análise de Segurança)
    runs-on: ubuntu-latest
    needs: test # Depende APENAS dos testes para conseguir ler a cobertura gerada
    timeout-minutes: 15
    steps:
      - name: Obter o código do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar Relatório de Cobertura (Artifact)
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Analisar a qualidade do código com SonarSource
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
