name: Esteira de Integração Contínua (CI)

on:
  push:
    branches: ["main"]
    paths-ignore: ['**.md', '.gitignore']
  pull_request:
    branches: ["main"]
    paths-ignore: ['**.md', '.gitignore']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Variáveis globais
env:
  NODE_VERSION: 22
  FORCE_JAVASCRIPT_ACTIONS_NODE24: 'true'


# Permissão global restrita apenas para leitura
permissions:
  contents: read

jobs:
  lint:
    name: Setup, Lint e Segurança
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint

  test:
    name: Testes Unitários e Integração (Vitest)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --coverage.enabled --coverage.reporter=lcov --coverage.reporter=text
      - name: Fazer Upload do Relatório de Cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1
          if-no-files-found: error

  build:
    name: Build (Sanity Check do Next.js)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restaurar Cache de Build do Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ github.ref }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ github.ref }}-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-
      - run: npm ci
      - run: npm run build
      
      # Salva o build pronto para ser reaproveitado no job e2e
      - name: Salvar Artefato de Build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          include-hidden-files: true
          retention-days: 1

  e2e:
    name: Testes End-to-End (Playwright)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      AUTH_SECRET: "e2e-secret-key-test-ignite-123456789"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      # Baixa a pasta .next gerada no job de build
      - name: Baixar Build Gerado
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      # Evita baixar o Chromium em toda execução
      - name: Cache do Playwright
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar Navegadores do Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
      - name: Fazer Upload do Relatório do Playwright em Falhas
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  sonar:
    name: SonarQube / SonarCloud (Análise)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    permissions:
      pull-requests: write 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Analisar a qualidade e aguardar Quality Gate
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >-
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.qualitygate.wait=true